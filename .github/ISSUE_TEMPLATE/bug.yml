name: Bug
description: 재현 가능한 결함 신고
title: "[Bug] "
labels: [bug]
body:
  - type: textarea
    id: observed
    attributes:
      label: 실제 동작
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: 기대 동작
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: 재현 절차
      description: 민감한 문서 내용과 키는 제거하세요.
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: 환경
      description: 브랜치/커밋, OS, Python 버전을 적어주세요.

